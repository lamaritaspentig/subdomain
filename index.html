<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Subdomain Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { cf: { brand: '#f38020', brandHover: '#e06f10' } } } }
        }
    </script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        // KONFIGURASI TERSEMBUH
        const CONFIG_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby00D0fbZlvV_BHkXc7q4ljcv_6CQLUFKDa7ow_GPHDQXpNkpVmrNA4ugjeQk3y3ngr/exec";

        const { useState } = React;

        function App() {
            const [appPassword, setAppPassword] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError("");

                try {
                    const response = await fetch(CONFIG_APPS_SCRIPT_URL, {
                        method: "POST",
                        mode: "cors",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({ action: "verifyLogin", appPassword: appPassword })
                    });
                    const data = await response.json();

                    if (data.success) {
                        window.location.reload(); // Di sini Anda bisa mengarahkan ke state dashboard
                    } else {
                        setError("Sandi Aplikasi salah.");
                    }
                } catch (err) {
                    setError("Gagal terhubung ke backend.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
                    <div className="text-center mb-8">
                        <h1 className="text-2xl font-bold text-white">Cloudflare Manager</h1>
                        <p className="text-slate-400 text-sm mt-2">Masukkan sandi untuk melanjutkan</p>
                    </div>
                    <form onSubmit={handleLogin} className="space-y-4">
                        <input 
                            type="password"
                            value={appPassword}
                            onChange={(e) => setAppPassword(e.target.value)}
                            placeholder="Sandi Aplikasi"
                            className="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl text-white focus:border-cf-brand outline-none"
                        />
                        {error && <p className="text-rose-400 text-xs">{error}</p>}
                        <button
                            type="submit"
                            disabled={loading}
                            className="w-full py-3 bg-cf-brand hover:bg-cf-brandHover text-white font-bold rounded-xl transition-all"
                        >
                            {loading ? "Memproses..." : "Masuk Dasbor"}
                        </button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
