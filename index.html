<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Subdomain Creator with Auth</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cfOrange: {
                            50: '#fff9f2',
                            100: '#fef2e2',
                            500: '#f48120', // Cloudflare Orange
                            600: '#e27315',
                            700: '#be5a0a',
                        },
                        cfDark: '#121214',
                        cfGray: '#1e1e24'
                    }
                }
            }
        }
    </script>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .code-font {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-gray-800 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // Initial Mock Data untuk masa Sandbox
            const initialMockRecords = [
                { id: "mock-1", name: "www.domainanda.com", type: "A", content: "192.168.1.10", proxied: true, ttl: 1, created_on: "2026-07-15T08:30:00.000Z", comment: "Website Utama" },
                { id: "mock-2", name: "blog.domainanda.com", type: "CNAME", content: "ghs.googlehosted.com", proxied: false, ttl: 3600, created_on: "2026-07-16T12:00:00.000Z" },
                { id: "mock-3", name: "api.domainanda.com", type: "A", content: "103.22.201.25", proxied: true, ttl: 1, created_on: "2026-07-18T14:45:00.000Z", comment: "Backend Server" }
            ];

            // Authentication States
            const [isLoggedIn, setIsLoggedIn] = useState(() => {
                const sessionAuth = sessionStorage.getItem('cf_logged_in') === 'true';
                const localAuth = localStorage.getItem('cf_remember_me') === 'true' && localStorage.getItem('cf_app_password');
                return sessionAuth || !!localAuth;
            });
            const [inputPassword, setInputPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [rememberMe, setRememberMe] = useState(false);
            const [loginError, setLoginError] = useState('');

            // App State
            const [activeTab, setActiveTab] = useState('create');
            const [isMockMode, setIsMockMode] = useState(() => {
                const savedMode = localStorage.getItem('cf_mock_mode');
                return savedMode !== 'false'; // Default to true (Sandbox)
            });
            
            // Apps Script Bridge states
            const [useAppsScript, setUseAppsScript] = useState(() => {
                return localStorage.getItem('cf_use_apps_script') !== 'false'; // Default true karena direkomendasikan
            });
            const [appsScriptUrl, setAppsScriptUrl] = useState(() => {
                return localStorage.getItem('cf_apps_script_url') || '';
            });
            const [secureStoreInGAS, setSecureStoreInGAS] = useState(() => {
                return localStorage.getItem('cf_secure_gas') !== 'false'; // Default true demi keamanan token
            });

            // Cloudflare credentials
            const [apiToken, setApiToken] = useState(() => localStorage.getItem('cf_api_token') || '');
            const [zoneId, setZoneId] = useState(() => localStorage.getItem('cf_zone_id') || '');
            const [rootDomain, setRootDomain] = useState(() => localStorage.getItem('cf_root_domain') || 'domainanda.com');
            
            // Get Active App Password
            const [appPassword, setAppPassword] = useState(() => {
                return localStorage.getItem('cf_app_password') || sessionStorage.getItem('cf_app_password') || '';
            });

            const [records, setRecords] = useState(() => {
                const local = localStorage.getItem('cf_saved_records');
                return local ? JSON.parse(local) : initialMockRecords;
            });
            const [logs, setLogs] = useState([]);
            
            // Subdomain Form State
            const [formData, setFormData] = useState({
                prefix: '',
                type: 'A',
                content: '',
                proxied: true,
                ttl: '1',
                comment: 'Dibuat via CF Subdomain Manager'
            });

            // UI feedback states
            const [loading, setLoading] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('ALL');
            const [toasts, setToasts] = useState([]);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);

            // Sync critical settings to localStorage
            useEffect(() => {
                localStorage.setItem('cf_api_token', apiToken);
                localStorage.setItem('cf_zone_id', zoneId);
                localStorage.setItem('cf_root_domain', rootDomain);
                localStorage.setItem('cf_use_apps_script', useAppsScript);
                localStorage.setItem('cf_apps_script_url', appsScriptUrl);
                localStorage.setItem('cf_secure_gas', secureStoreInGAS);
                localStorage.setItem('cf_mock_mode', isMockMode);
            }, [apiToken, zoneId, rootDomain, useAppsScript, appsScriptUrl, secureStoreInGAS, isMockMode]);

            useEffect(() => {
                localStorage.setItem('cf_saved_records', JSON.stringify(records));
            }, [records]);

            // Add Toast Message helper
            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000);
            };

            // Add developer logs helper
            const addLog = (type, action, status, payload, response) => {
                const timestamp = new Date().toLocaleTimeString();
                setLogs(prev => [
                    { id: Date.now(), timestamp, type, action, status, payload, response },
                    ...prev
                ]);
            };

            // Handle Login Action
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                setLoading(true);

                if (!appsScriptUrl && !isMockMode) {
                    setLoginError('Konfigurasi URL Google Apps Script kosong! Selesaikan konfigurasi atau aktifkan Mode Sandbox.');
                    setLoading(false);
                    return;
                }

                // Jika mode Sandbox, bypass verifikasi ke Apps Script
                if (isMockMode) {
                    await new Promise(resolve => setTimeout(resolve, 800));
                    setIsLoggedIn(true);
                    sessionStorage.setItem('cf_logged_in', 'true');
                    if (rememberMe) {
                        localStorage.setItem('cf_remember_me', 'true');
                        localStorage.setItem('cf_app_password', inputPassword);
                    } else {
                        sessionStorage.setItem('cf_app_password', inputPassword);
                    }
                    setAppPassword(inputPassword);
                    showToast("Berhasil masuk dalam mode Sandbox!", "success");
                    setLoading(false);
                    return;
                }

                // Verifikasi sandi dengan mengirim request ke Google Apps Script
                try {
                    const response = await fetch(appsScriptUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'verifyLogin',
                            appPassword: inputPassword,
                            apiToken: secureStoreInGAS ? "" : apiToken,
                            zoneId: secureStoreInGAS ? "" : zoneId
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        setIsLoggedIn(true);
                        sessionStorage.setItem('cf_logged_in', 'true');
                        
                        if (rememberMe) {
                            localStorage.setItem('cf_remember_me', 'true');
                            localStorage.setItem('cf_app_password', inputPassword);
                        } else {
                            sessionStorage.setItem('cf_app_password', inputPassword);
                            localStorage.removeItem('cf_remember_me');
                            localStorage.removeItem('cf_app_password');
                        }
                        
                        setAppPassword(inputPassword);
                        showToast("Otentikasi Berhasil! Selamat Datang.", "success");
                        addLog('AUTH', 'Akses Login', 'SUCCESS', { appsScriptUrl }, data);
                    } else {
                        setLoginError(data.errors?.[0]?.message || "Sandi Aplikasi salah.");
                        addLog('AUTH', 'Akses Login Failed', 'DENIED', null, data);
                    }
                } catch (error) {
                    setLoginError("Gagal menghubungkan ke Apps Script. Pastikan URL Apps Script benar dan sudah di-deploy dengan hak akses 'Anyone'.");
                    addLog('AUTH', 'Akses Login Error', 'FAILED', null, { error: error.toString() });
                } finally {
                    setLoading(false);
                }
            };

            // Handle Logout
            const handleLogout = () => {
                setIsLoggedIn(false);
                setInputPassword('');
                sessionStorage.removeItem('cf_logged_in');
                sessionStorage.removeItem('cf_app_password');
                localStorage.removeItem('cf_remember_me');
                localStorage.removeItem('cf_app_password');
                setAppPassword('');
                showToast("Anda telah keluar dengan aman.", "info");
            };

            // Fetch live Cloudflare DNS records (Supports direct and GAS route)
            const fetchLiveRecords = async () => {
                if (useAppsScript && !appsScriptUrl) {
                    showToast("Harap isi URL Google Apps Script Anda di menu Setelan!", "error");
                    return;
                }
                
                setLoading(true);
                addLog('API_REQUEST', 'GET DNS Records', 'PENDING', { action: 'list' }, null);

                try {
                    let data;
                    if (useAppsScript) {
                        const res = await fetch(appsScriptUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                action: 'list',
                                appPassword: appPassword,
                                apiToken: secureStoreInGAS ? "" : apiToken,
                                zoneId: secureStoreInGAS ? "" : zoneId
                            })
                        });
                        data = await res.json();
                    } else {
                        // Direct ke Cloudflare (raw request)
                        const response = await fetch(`https://api.cloudflare.com/client/v4/zones/${zoneId}/dns_records?per_page=100`, {
                            method: 'GET',
                            headers: {
                                'Authorization': `Bearer ${apiToken}`,
                                'Content-Type': 'application/json'
                            }
                        });
                        data = await response.json();
                    }
                    
                    if (data.success) {
                        setRecords(data.result);
                        showToast("Berhasil menyinkronkan data DNS dari Cloudflare!", "success");
                        addLog('API_RESPONSE', 'GET DNS Records', 'SUCCESS', null, data);
                    } else {
                        const errMsg = data.errors?.[0]?.message || "Gagal mengambil data dari API.";
                        showToast(errMsg, "error");
                        addLog('API_RESPONSE', 'GET DNS Records', 'ERROR', null, data);
                        if (data.errors?.[0]?.message.includes("Sandi")) {
                            handleLogout(); // Force logout jika sandi salah di tengah jalan
                        }
                    }
                } catch (err) {
                    showToast("Sambungan gagal! Periksa URL Apps Script atau sandi Anda.", "error");
                    addLog('API_RESPONSE', 'GET DNS Records', 'FAILED', null, { error: err.message });
                } finally {
                    setLoading(false);
                }
            };

            const handleCreateSubdomain = async (e) => {
                e.preventDefault();
                
                const fullDomain = formData.prefix.trim() 
                    ? `${formData.prefix.trim()}.${rootDomain}`
                    : rootDomain;

                if (!formData.content.trim()) {
                    showToast("Harap isi nilai target/content DNS!", "error");
                    return;
                }

                const payload = {
                    type: formData.type,
                    name: fullDomain,
                    content: formData.content.trim(),
                    ttl: parseInt(formData.ttl),
                    proxied: ['A', 'AAAA', 'CNAME'].includes(formData.type) ? formData.proxied : false,
                    comment: formData.comment
                };

                setLoading(true);

                if (isMockMode) {
                    await new Promise(resolve => setTimeout(resolve, 800));
                    
                    const newRecord = {
                        id: `mock-${Date.now()}`,
                        name: fullDomain,
                        type: payload.type,
                        content: payload.content,
                        proxied: payload.proxied,
                        ttl: payload.ttl,
                        created_on: new Date().toISOString(),
                        comment: payload.comment
                    };

                    setRecords([newRecord, ...records]);
                    showToast(`Subdomain ${fullDomain} berhasil dibuat (Sandbox)!`, "success");
                    addLog('MOCK_ACTION', 'CREATE DNS Record', 'SUCCESS', payload, newRecord);
                    
                    setFormData(prev => ({ ...prev, prefix: '', content: '' }));
                    setActiveTab('list');
                    setLoading(false);
                } else {
                    addLog('API_REQUEST', 'POST Create DNS Record', 'PENDING', payload, null);

                    try {
                        let data;
                        if (useAppsScript) {
                            const res = await fetch(appsScriptUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    action: 'create',
                                    appPassword: appPassword,
                                    apiToken: secureStoreInGAS ? "" : apiToken,
                                    zoneId: secureStoreInGAS ? "" : zoneId,
                                    recordData: payload
                                })
                            });
                            data = await res.json();
                        } else {
                            const response = await fetch(`https://api.cloudflare.com/client/v4/zones/${zoneId}/dns_records`, {
                                method: 'POST',
                                headers: {
                                    'Authorization': `Bearer ${apiToken}`,
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify(payload)
                            });
                            data = await response.json();
                        }

                        if (data.success) {
                            setRecords([data.result, ...records]);
                            showToast(`Subdomain ${fullDomain} sukses dibuat di Live Cloudflare!`, "success");
                            addLog('API_RESPONSE', 'POST Create DNS Record', 'SUCCESS', payload, data);
                            setFormData(prev => ({ ...prev, prefix: '', content: '' }));
                            setActiveTab('list');
                        } else {
                            const errMsg = data.errors?.[0]?.message || "Gagal membuat record.";
                            showToast(errMsg, "error");
                            addLog('API_RESPONSE', 'POST Create DNS Record', 'ERROR', payload, data);
                        }
                    } catch (err) {
                        showToast(`Gagal: ${err.message}`, "error");
                        addLog('API_RESPONSE', 'POST Create DNS Record', 'FAILED', payload, { error: err.message });
                    } finally {
                        setLoading(false);
                    }
                }
            };

            const handleDeleteRecord = async (id) => {
                setLoading(true);
                const recordToDelete = records.find(r => r.id === id);
                const recordName = recordToDelete ? recordToDelete.name : 'Subdomain';

                if (isMockMode) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    setRecords(records.filter(r => r.id !== id));
                    showToast(`Subdomain ${recordName} berhasil dihapus (Sandbox)!`, "success");
                    addLog('MOCK_ACTION', 'DELETE DNS Record', 'SUCCESS', { id }, { status: 'deleted' });
                    setLoading(false);
                    setConfirmDeleteId(null);
                } else {
                    addLog('API_REQUEST', 'DELETE DNS Record', 'PENDING', { id }, null);

                    try {
                        let data;
                        if (useAppsScript) {
                            const res = await fetch(appsScriptUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    action: 'delete',
                                    appPassword: appPassword,
                                    apiToken: secureStoreInGAS ? "" : apiToken,
                                    zoneId: secureStoreInGAS ? "" : zoneId,
                                    recordId: id
                                })
                            });
                            data = await res.json();
                        } else {
                            const response = await fetch(`https://api.cloudflare.com/client/v4/zones/${zoneId}/dns_records/${id}`, {
                                method: 'DELETE',
                                headers: {
                                    'Authorization': `Bearer ${apiToken}`,
                                    'Content-Type': 'application/json'
                                }
                            });
                            data = await response.json();
                        }

                        if (data.success) {
                            setRecords(records.filter(r => r.id !== id));
                            showToast(`DNS record ${recordName} berhasil dihapus!`, "success");
                            addLog('API_RESPONSE', 'DELETE DNS Record', 'SUCCESS', { id }, data);
                        } else {
                            showToast(data.errors?.[0]?.message || "Gagal menghapus.", "error");
                            addLog('API_RESPONSE', 'DELETE DNS Record', 'ERROR', { id }, data);
                        }
                    } catch (err) {
                        showToast(`Gagal: ${err.message}`, "error");
                    } finally {
                        setLoading(false);
                        setConfirmDeleteId(null);
                    }
                }
            };

            const toggleProxyLocal = async (record) => {
                const updatedProxy = !record.proxied;
                setLoading(true);

                if (isMockMode) {
                    setRecords(records.map(r => r.id === record.id ? { ...r, proxied: updatedProxy } : r));
                    showToast(`Proxy ${record.name} diubah ke ${updatedProxy ? 'Proxied' : 'DNS Only'}!`, "info");
                    setLoading(false);
                } else {
                    addLog('API_REQUEST', 'UPDATE DNS Proxy', 'PENDING', { id: record.id, proxied: updatedProxy }, null);

                    try {
                        let data;
                        if (useAppsScript) {
                            const res = await fetch(appsScriptUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    action: 'toggleProxy',
                                    appPassword: appPassword,
                                    apiToken: secureStoreInGAS ? "" : apiToken,
                                    zoneId: secureStoreInGAS ? "" : zoneId,
                                    recordId: record.id,
                                    proxied: updatedProxy
                                })
                            });
                            data = await res.json();
                        } else {
                            const payload = {
                                type: record.type,
                                name: record.name,
                                content: record.content,
                                ttl: record.ttl,
                                proxied: updatedProxy
                            };
                            const response = await fetch(`https://api.cloudflare.com/client/v4/zones/${zoneId}/dns_records/${record.id}`, {
                                method: 'PUT',
                                headers: {
                                    'Authorization': `Bearer ${apiToken}`,
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify(payload)
                            });
                            data = await response.json();
                        }

                        if (data.success) {
                            setRecords(records.map(r => r.id === record.id ? { ...r, proxied: updatedProxy } : r));
                            showToast(`Proxy ${record.name} berhasil diubah!`, "success");
                            addLog('API_RESPONSE', 'UPDATE DNS Proxy', 'SUCCESS', { id: record.id, proxied: updatedProxy }, data);
                        } else {
                            showToast(data.errors?.[0]?.message || "Gagal mengubah proxy.", "error");
                        }
                    } catch (err) {
                        showToast(`Error: ${err.message}`, "error");
                    } finally {
                        setLoading(false);
                    }
                }
            };

            // Filtered records
            const filteredRecords = useMemo(() => {
                return records.filter(rec => {
                    const matchesSearch = rec.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          rec.content.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesType = filterType === 'ALL' || rec.type === filterType;
                    return matchesSearch && matchesType;
                });
            }, [records, searchQuery, filterType]);

            // RENDER SCREEN 1: LOGIN PAGE
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 relative overflow-hidden">
                        {/* Decorative background shapes */}
                        <div className="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] rounded-full bg-orange-600/10 blur-[120px]"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] rounded-full bg-cyan-600/10 blur-[120px]"></div>

                        <div className="max-w-md w-full z-10 animate-in fade-in zoom-in duration-300">
                            {/* Logo and Brand */}
                            <div className="text-center mb-8">
                                <div className="inline-flex w-16 h-16 rounded-2xl bg-gradient-to-tr from-orange-500 to-amber-400 items-center justify-center shadow-2xl shadow-orange-500/30 mb-4">
                                    <i className="fa-solid fa-shield-halved text-white text-3xl"></i>
                                </div>
                                <h1 className="text-2xl font-extrabold text-white tracking-tight">Cloudflare Gateway</h1>
                                <p className="text-sm text-slate-400 mt-1.5">Sistem Manajemen Subdomain Terenkripsi</p>
                            </div>

                            {/* Login Card */}
                            <div className="bg-slate-900/80 backdrop-blur-md rounded-2xl p-8 border border-slate-800 shadow-2xl">
                                <h2 className="text-lg font-bold text-white mb-6">Akses Masuk Terlindungi</h2>
                                
                                {loginError && (
                                    <div className="mb-5 p-3 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs flex gap-2.5 items-start">
                                        <i className="fa-solid fa-circle-exclamation mt-0.5 shrink-0"></i>
                                        <span>{loginError}</span>
                                    </div>
                                )}

                                <form onSubmit={handleLogin} className="space-y-5">
                                    {/* Environment Warning */}
                                    <div className="p-3 bg-slate-950 rounded-xl border border-slate-800 flex items-center justify-between">
                                        <div className="flex flex-col">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Mode Operasi</span>
                                            <span className="text-xs text-white font-medium">{isMockMode ? 'Sandbox (Simulasi Lokal)' : 'Koneksi Live Proxy'}</span>
                                        </div>
                                        <button 
                                            type="button"
                                            onClick={() => {
                                                setIsMockMode(!isMockMode);
                                                setLoginError('');
                                                showToast(`Pindah ke ${!isMockMode ? 'Mode Sandbox' : 'Mode Live API'}`, 'info');
                                            }}
                                            className={`px-2.5 py-1 text-[10px] font-bold rounded-lg transition-all ${
                                                isMockMode ? 'bg-amber-500/20 text-amber-300 border border-amber-500/30' : 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30'
                                            }`}
                                        >
                                            Ubah Mode
                                        </button>
                                    </div>

                                    {/* Google Apps Script URL (Hanya tampil jika Live Mode) */}
                                    {!isMockMode && (
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">URL Google Apps Script</label>
                                            <div className="relative">
                                                <input 
                                                    type="text" 
                                                    value={appsScriptUrl}
                                                    onChange={(e) => setAppsScriptUrl(e.target.value.trim())}
                                                    placeholder="https://script.google.com/macros/s/..." 
                                                    className="w-full pl-10 pr-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 text-xs transition-all code-font"
                                                    required
                                                />
                                                <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">
                                                    <i className="fa-solid fa-link"></i>
                                                </span>
                                            </div>
                                        </div>
                                    )}

                                    {/* Sandi Input */}
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Sandi Aplikasi</label>
                                        <div className="relative">
                                            <input 
                                                type={showPassword ? "text" : "password"}
                                                value={inputPassword}
                                                onChange={(e) => setInputPassword(e.target.value)}
                                                placeholder="Masukkan sandi keamanan..." 
                                                className="w-full pl-10 pr-12 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 text-sm transition-all"
                                                required
                                            />
                                            <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">
                                                <i className="fa-solid fa-lock"></i>
                                            </span>
                                            <button 
                                                type="button"
                                                onClick={() => setShowPassword(!showPassword)}
                                                className="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 text-sm transition-all"
                                            >
                                                <i className={showPassword ? "fa-solid fa-eye-slash" : "fa-solid fa-eye"}></i>
                                            </button>
                                        </div>
                                    </div>

                                                    <select 
                                                        value={formData.type}
                                                        onChange={(e) => setFormData({ ...formData, type: e.target.value, content: '' })}
                                                        className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 text-sm transition-all font-semibold"
                                                    >
                                                        <option value="A">A (IPv4)</option>
                                                        <option value="AAAA">AAAA (IPv6)</option>
                                                        <option value="CNAME">CNAME (Alias)</option>
                                                        <option value="TXT">TXT (Teks)</option>
                                                    </select>
                                                </div>

                                                <div className="md:col-span-2">
                                                    <label className="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">
                                                        {formData.type === 'A' && 'IPv4 Address (Target IP)'}
                                                        {formData.type === 'AAAA' && 'IPv6 Address (Target IP)'}
                                                        {formData.type === 'CNAME' && 'Target Hostname (Domain Alias)'}
                                                        {formData.type === 'TXT' && 'Nilai Teks (Value/Content)'}
                                                    </label>
                                                    <div className="relative">
                                                        <input 
                                                            type="text" 
                                                            value={formData.content}
                                                            onChange={(e) => setFormData({ ...formData, content: e.target.value })}
                                                            placeholder={
                                                                formData.type === 'A' ? 'Contoh: 192.168.1.1' :
                                                                formData.type === 'AAAA' ? 'Contoh: 2001:db8::1' :
                                                                formData.type === 'CNAME' ? 'Contoh: domains.myhost.com' : 'Contoh: google-site-verification=xyz'
                                                            } 
                                                            className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 text-sm transition-all code-font"
                                                            required
                                                        />
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Advanced Settings (TTL & Proxy Switch) */}
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 p-4 bg-slate-50 rounded-xl border border-slate-100">
                                                
                                                {/* Proxy Toggle */}
                                                <div className="flex flex-col justify-between">
                                                    <div>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-xs font-bold text-slate-700 uppercase tracking-wider">Cloudflare Proxy</span>
                                                            <span className={`text-[10px] font-bold px-1.5 py-0.25 rounded ${
                                                                ['A', 'AAAA', 'CNAME'].includes(formData.type) ? 'bg-orange-100 text-orange-700' : 'bg-slate-200 text-slate-500'
                                                            }`}>
                                                                {['A', 'AAAA', 'CNAME'].includes(formData.type) ? 'Tersedia' : 'Tidak Didukung'}
                                                            </span>
                                                        </div>
                                                        <p className="text-[10px] text-slate-400 mt-1">Mengaktifkan CDN, Caching, WAF, dan SSL Cloudflare.</p>
                                                    </div>
                                                    <div className="mt-3 flex items-center gap-3">
                                                        <button 
                                                            type="button"
                                                            disabled={!['A', 'AAAA', 'CNAME'].includes(formData.type)}
                                                            onClick={() => setFormData({ ...formData, proxied: !formData.proxied })}
                                                            className={`flex items-center gap-2 px-3.5 py-2 rounded-lg text-xs font-semibold border transition-all ${
                                                                ['A', 'AAAA', 'CNAME'].includes(formData.type) && formData.proxied
                                                                    ? 'bg-orange-500 border-orange-500 text-white shadow-sm'
                                                                    : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'
                                                            }`}
                                                        >
                                                            <i className="fa-solid fa-cloud"></i>
                                                            {['A', 'AAAA', 'CNAME'].includes(formData.type) && formData.proxied ? 'Proxied (Oranye)' : 'DNS Only (Abu-abu)'}
                                                        </button>
                                                    </div>
                                                </div>

                                                {/* TTL Settings */}
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">TTL (Time to Live)</label>
                                                    <select 
                                                        value={formData.ttl}
                                                        onChange={(e) => setFormData({ ...formData, ttl: e.target.value })}
                                                        className="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 text-xs transition-all font-semibold bg-white"
                                                    >
                                                        <option value="1">Otomatis (Auto)</option>
                                                        <option value="60">1 Menit</option>
                                                        <option value="120">2 Menit</option>
                                                        <option value="300">5 Menit</option>
                                                        <option value="600">10 Menit</option>
                                                        <option value="3600">1 Jam</option>
                                                    </select>
                                                    <p className="text-[10px] text-slate-400 mt-1.5">Auto adalah nilai yang sangat direkomendasikan untuk Proxy aktif.</p>
                                                </div>

                                            </div>

                                            {/* Comment */}
                                            <div>
                                                <label className="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Deskripsi / Komentar Record (Opsional)</label>
                                                <input 
                                                    type="text"
                                                    value={formData.comment}
                                                    onChange={(e) => setFormData({ ...formData, comment: e.target.value })}
                                                    placeholder="Contoh: Hosting Toko, dll"
                                                    className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 text-sm transition-all"
                                                />
                                            </div>

                                            {/* Submit Button */}
                                            <div className="pt-2">
                                                <button 
                                                    type="submit" 
                                                    disabled={loading}
                                                    className="w-full py-3.5 bg-orange-500 hover:bg-orange-600 text-white rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 shadow-lg shadow-orange-600/15"
                                                >
                                                    {loading ? (
                                                        <i className="fa-solid fa-spinner animate-spin text-base"></i>
                                                    ) : (
                                                        <i className="fa-solid fa-cloud-arrow-up"></i>
                                                    )}
                                                    {isMockMode 
                                                        ? "Buat Record (Simulasi)" 
                                                        : (useAppsScript ? "Deploy via Google Apps Script Proxy" : "Deploy langsung ke Cloudflare")}
                                                </button>
                                            </div>

                                        </form>
                                    </div>

                                    {/* Sidebar Tips */}
                                    <div className="space-y-6">
                                        <div className="bg-slate-900 text-slate-300 p-6 rounded-2xl shadow-sm border border-slate-800">
                                            <h4 className="text-white text-sm font-bold flex items-center gap-2 mb-3">
                                                <i className="fa-solid fa-circle-question text-orange-400"></i>
                                                Mengenai Tipe DNS
                                            </h4>
                                            <div className="space-y-3.5 text-xs font-light">
                                                <div>
                                                    <strong className="text-orange-400 font-semibold block">Record A:</strong>
                                                    Mengarahkan subdomain langsung ke alamat alamat IPv4 publik VPS/Hosting.
                                                </div>
                                                <div>
                                                    <strong className="text-orange-400 font-semibold block">Record CNAME:</strong>
                                                    Aliaskan nama subdomain ke nama server atau target domain lain (misal: drakor.pages.dev).
                                                </div>
                                                <div>
                                                    <strong className="text-orange-400 font-semibold block">Proxy Cloudflare:</strong>
                                                    Warna <strong className="text-white">Oranye</strong> melindungi IP asli Anda menggunakan filter keamanan & CDN Cloudflare.
                                                </div>
                                            </div>
                                        </div>

                                        {/* Status Connection Widget */}
                                        <div className="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm flex flex-col gap-3">
                                            <h4 className="text-slate-800 font-bold text-sm">Status Sambungan</h4>
                                            
                                            <div className="flex items-center gap-2 text-xs">
                                                <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                                                <span className="text-slate-500">Otentikasi Dasbor: Aktif</span>
                                            </div>
                                            <div className="flex items-center gap-2 text-xs">
                                                <span className={`w-2.5 h-2.5 rounded-full ${useAppsScript ? 'bg-cyan-500' : 'bg-slate-300'}`}></span>
                                                <span className="text-slate-500">Apps Script Bridge: {useAppsScript ? 'Aktif' : 'Nonaktif'}</span>
                                            </div>
                                            {useAppsScript ? (
                                                <div className="flex items-center gap-2 text-xs">
                                                    <span className={`w-2.5 h-2.5 rounded-full ${appsScriptUrl ? 'bg-emerald-500' : 'bg-rose-500'}`}></span>
                                                    <span className="text-slate-500">GAS URL: {appsScriptUrl ? 'Terkonfigurasi' : 'Kosong'}</span>
                                                </div>
                                            ) : (
                                                <div className="flex items-center gap-2 text-xs">
                                                    <span className={`w-2.5 h-2.5 rounded-full ${apiToken ? 'bg-emerald-500' : 'bg-rose-500'}`}></span>
                                                    <span className="text-slate-500">Cloudflare Token: {apiToken ? 'Tersedia' : 'Kosong'}</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB: LIST RECORDS */}
                            {activeTab === 'list' && (
                                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden animate-in fade-in duration-200">
                                    
                                    {/* Filter panel */}
                                    <div className="p-5 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4 bg-slate-50/50">
                                        <div className="relative flex-1 max-w-md">
                                            <input 
                                                type="text" 
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                placeholder="Cari subdomain atau IP target..." 
                                                className="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 text-xs transition-all bg-white"
                                            />
                                            <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs">
                                                <i className="fa-solid fa-magnifying-glass"></i>
                                            </span>
                                        </div>

                                        {/* Filter selector */}
                                        <div className="flex items-center gap-2 self-start md:self-auto overflow-x-auto w-full md:w-auto">
                                            <span className="text-xs font-semibold text-slate-400 shrink-0">Tipe Record:</span>
                                            {['ALL', 'A', 'AAAA', 'CNAME', 'TXT'].map(type => (
                                                <button 
                                                    key={type}
                                                    onClick={() => setFilterType(type)}
                                                    className={`px-3 py-1.5 rounded-lg text-xs font-bold uppercase transition-all select-none ${
                                                        filterType === type 
                                                            ? 'bg-orange-500 text-white' 
                                                            : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-100'
                                                    }`}
                                                >
                                                    {type}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Table View */}
                                    {filteredRecords.length === 0 ? (
                                        <div className="py-16 text-center">
                                            <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 mx-auto text-2xl mb-4">
                                                <i className="fa-solid fa-cloud-sun"></i>
                                            </div>
                                            <p className="text-slate-500 font-semibold text-sm">Tidak Ada DNS Record Ditemukan</p>
                                            <p className="text-slate-400 text-xs mt-1">Coba buat subdomain baru atau sesuaikan filter Anda.</p>
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-wider bg-slate-50/20">
                                                        <th className="py-4 px-6">Domain / Record Name</th>
                                                        <th className="py-4 px-6 w-24">Type</th>
                                                        <th className="py-4 px-6">Target/Value</th>
                                                        <th className="py-4 px-6 w-32 text-center">Proxy</th>
                                                        <th className="py-4 px-6 w-24">TTL</th>
                                                        <th className="py-4 px-6 w-20 text-center">Aksi</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-sm">
                                                    {filteredRecords.map((record) => (
                                                        <tr key={record.id} className="hover:bg-slate-50/50 transition-colors">
                                                            <td className="py-4 px-6">
                                                                <div className="font-semibold text-slate-800">{record.name}</div>
                                                                {record.comment && (
                                                                    <div className="text-[10px] text-slate-400 mt-0.5">{record.comment}</div>
                                                                )}
                                                            </td>
                                                            <td className="py-4 px-6">
                                                                <span className={`inline-block text-[10px] font-bold px-2 py-0.5 rounded ${
                                                                    record.type === 'A' ? 'bg-blue-50 text-blue-700 border border-blue-100' :
                                                                    record.type === 'AAAA' ? 'bg-purple-50 text-purple-700 border border-purple-100' :
                                                                    record.type === 'CNAME' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' :
                                                                    'bg-slate-100 text-slate-600 border border-slate-200'
                                                                }`}>
                                                                    {record.type}
                                                                </span>
                                                            </td>
                                                            <td className="py-4 px-6 code-font text-xs text-slate-600 truncate max-w-xs" title={record.content}>
                                                                {record.content}
                                                            </td>
                                                            <td className="py-4 px-6 text-center">
                                                                {['A', 'AAAA', 'CNAME'].includes(record.type) ? (
                                                                    <button 
                                                                        onClick={() => toggleProxyLocal(record)}
                                                                        disabled={loading}
                                                                        className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-bold transition-all border ${
                                                                            record.proxied 
                                                                                ? 'bg-orange-50 border-orange-100 text-orange-700 hover:bg-orange-100' 
                                                                                : 'bg-slate-50 border-slate-200 text-slate-500 hover:bg-slate-100'
                                                                        }`}
                                                                        title="Klik untuk mengubah mode proxy"
                                                                    >
                                                                        <i className={`fa-solid fa-cloud text-xs ${record.proxied ? 'text-orange-500' : 'text-slate-400'}`}></i>
                                                                        {record.proxied ? 'Proxied' : 'DNS Only'}
                                                                    </button>
                                                                ) : (
                                                                    <span className="text-xs text-slate-300">-</span>
                                                                )}
                                                            </td>
                                                            <td className="py-4 px-6 text-xs text-slate-500">
                                                                {record.ttl === 1 ? 'Auto' : `${record.ttl}s`}
                                                            </td>
                                                            <td className="py-4 px-6 text-center">
                                                                <button 
                                                                    onClick={() => setConfirmDeleteId(record.id)}
                                                                    className="w-8 h-8 rounded-lg hover:bg-rose-50 text-slate-400 hover:text-rose-600 transition-all flex items-center justify-center"
                                                                    title="Hapus Subdomain"
                                                                >
                                                                    <i className="fa-regular fa-trash-can"></i>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}

                                    {/* Stats footer */}
                                    <div className="p-4 border-t border-slate-100 bg-slate-50/30 flex justify-between items-center text-xs text-slate-400">
                                        <span>Menampilkan {filteredRecords.length} dari total {records.length} subdomain</span>
                                        {isMockMode && <span className="text-amber-500 font-semibold"><i className="fa-solid fa-triangle-exclamation mr-1"></i>Aplikasi berjalan dalam simulasi (Sandbox)</span>}
                                    </div>
                                </div>
                            )}

                            {/* TAB: DEVELOPER LOGS */}
                            {activeTab === 'logs' && (
                                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden animate-in fade-in duration-200">
                                    <div className="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                                        <div>
                                            <h3 className="font-bold text-slate-800 text-sm">Konsol Aktivitas API</h3>
                                            <p className="text-xs text-slate-400 mt-0.5">Melihat tanggapan JSON langsung dari Cloudflare & Proxy GAS.</p>
                                        </div>
                                        <button 
                                            onClick={() => {
                                                setLogs([]);
                                                showToast("Log dibersihkan!", "info");
                                            }}
                                            className="px-3 py-1.5 text-xs font-semibold text-rose-600 hover:bg-rose-50 rounded-lg transition-all"
                                        >
                                            Hapus Semua Log
                                        </button>
                                    </div>

                                    {logs.length === 0 ? (
                                        <div className="py-16 text-center text-slate-400">
                                            <i className="fa-solid fa-code text-4xl mb-3 text-slate-200"></i>
                                            <p className="text-sm font-semibold">Tidak Ada Log Tersimpan</p>
                                            <p className="text-xs mt-1">Lakukan sinkronisasi atau pembuatan record untuk mencatat aktivitas.</p>
                                        </div>
                                    ) : (
                                        <div className="divide-y divide-slate-100 max-h-[600px] overflow-y-auto">
                                            {logs.map((log) => (
                                                <div key={log.id} className="p-5 hover:bg-slate-50/30 transition-all">
                                                    <div className="flex items-center justify-between mb-3">
                                                        <div className="flex items-center gap-2">
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${
                                                                log.status === 'SUCCESS' ? 'bg-emerald-500/10 text-emerald-500' :
                                                                log.status === 'PENDING' ? 'bg-amber-500/10 text-amber-500 animate-pulse' :
                                                                'bg-rose-500/10 text-rose-500'
                                                            }`}>
                                                                {log.status}
                                                            </span>
                                                            <span className="text-slate-800 font-bold text-xs">{log.action}</span>
                                                        </div>
                                                        <span className="text-[10px] text-slate-400">{log.timestamp}</span>
                                                    </div>

                                                    <div className="space-y-2 mt-2">
                                                        {log.payload && (
                                                            <div>
                                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Payload / Parameter Kirim:</span>
                                                                <pre className="mt-1 p-3 bg-slate-900 text-emerald-400 rounded-lg text-[11px] code-font overflow-x-auto shadow-inner max-h-40">
                                                                    {JSON.stringify(log.payload, null, 2)}
                                                                </pre>
                                                            </div>
                                                        )}
                                                        {log.response && (
                                                            <div>
                                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Respons Server (JSON):</span>
                                                                <pre className="mt-1 p-3 bg-slate-900 text-amber-400 rounded-lg text-[11px] code-font overflow-x-auto shadow-inner max-h-40">
                                                                    {JSON.stringify(log.response, null, 2)}
                                                                </pre>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
