<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Subdomain Manager</title>
    <!-- Tailwind CSS untuk Styling Premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cf: {
                            brand: '#f38020',
                            brandHover: '#e06f10',
                            darkBg: '#090d16',
                            panelBg: '#111827',
                            border: '#1f2937'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #090d16;
        }
    </style>
</head>
<body class="min-h-screen text-slate-400 flex flex-col justify-between">

    <!-- Container Utama React -->
    <div id="root" class="flex-grow flex items-center justify-center p-4"></div>

    <!-- React 18 & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Script Utama React -->
    <script type="text/babel">
        // =========================================================================
        // ⚡ KONFIGURASI JEMBATAN PROXY ⚡
        // =========================================================================
        const CONFIG_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIVztg9DEorq9cVW3UOePGYxNPykgbBjewh72U3udyMW_9PKxhU0ceqQTXKRskwmWxmQ/exec";
        
        const { useState, useEffect } = React;

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [appPassword, setAppPassword] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            const [rememberMe, setRememberMe] = useState(true);

            // State Data Cloudflare (Kredensial diambil langsung oleh Apps Script)
            const [records, setRecords] = useState([]);
            const [recordsLoading, setRecordsLoading] = useState(false);
            const [recordsError, setRecordsError] = useState("");
            
            // State Form Pembuatan Record
            const [dnsType, setDnsType] = useState("A");
            const [subdomainName, setSubdomainName] = useState("");
            const [targetContent, setTargetContent] = useState("");
            const [isProxied, setIsProxied] = useState(true);
            const [ttlValue, setTtlValue] = useState(1); // 1 = Auto

            // State Filter & Pencarian
            const [searchQuery, setSearchQuery] = useState("");
            const [filterType, setFilterType] = useState("ALL");

            // State UI Kustom (Pengganti Alert & Confirm bawaan browser)
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });
            const [confirmModal, setConfirmModal] = useState({ show: false, recordId: null, recordName: "" });

            useEffect(() => {
                const savedLogin = localStorage.getItem("cf_logged_in");
                const savedPassword = localStorage.getItem("cf_saved_password");

                if (savedPassword) {
                    setAppPassword(savedPassword);
                }
                if (savedLogin === "true" && savedPassword) {
                    setIsLoggedIn(true);
                }
            }, []);

            useEffect(() => {
                if (isLoggedIn) {
                    fetchDnsRecords();
                }
            }, [isLoggedIn]);

            // Helper pemicu notifikasi Toast kustom
            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => {
                    setToast({ show: false, message: "", type: "info" });
                }, 4000);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError("");

                if (!appPassword.trim()) {
                    setError("Silakan masukkan Sandi Aplikasi terlebih dahulu.");
                    setLoading(false);
                    return;
                }

                try {
                    const response = await fetch(CONFIG_APPS_SCRIPT_URL, {
                        method: "POST",
                        mode: "cors",
                        credentials: "omit",
                        redirect: "follow",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            action: "verifyLogin",
                            appPassword: appPassword.trim()
                        })
                    });

                    const text = await response.text();
                    let data;
                    try {
                        data = JSON.parse(text);
                    } catch (e) {
                        throw new Error("Gagal mengurai respon server. Periksa kembali deployment Google Apps Script Anda.");
                    }

                    if (data && data.success) {
                        setIsLoggedIn(true);
                        if (rememberMe) {
                            localStorage.setItem("cf_logged_in", "true");
                            localStorage.setItem("cf_saved_password", appPassword.trim());
                        } else {
                            localStorage.removeItem("cf_logged_in");
                            localStorage.removeItem("cf_saved_password");
                        }
                        showToast("Berhasil masuk ke dasbor!");
                    } else {
                        setError(data && data.errors ? data.errors[0].message : "Sandi Aplikasi salah.");
                    }
                } catch (err) {
                    setError(err.message || "Gagal terhubung ke Google Apps Script.");
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                localStorage.removeItem("cf_logged_in");
                showToast("Anda telah keluar secara aman.", "info");
            };

            const fetchDnsRecords = async () => {
                setRecordsLoading(true);
                setRecordsError("");

                try {
                    const response = await fetch(CONFIG_APPS_SCRIPT_URL, {
                        method: "POST",
                        mode: "cors",
                        credentials: "omit",
                        redirect: "follow",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            action: "list",
                            appPassword: appPassword.trim()
                        })
                    });

                    const text = await response.text();
                    const data = JSON.parse(text);

                    if (data.success) {
                        setRecords(data.result || []);
                    } else {
                        setRecordsError(data.errors && data.errors[0] ? data.errors[0].message : "Gagal memuat DNS.");
                    }
                } catch (err) {
                    setRecordsError("Gagal mengambil data dari Google Proxy: " + err.message);
                } finally {
                    setRecordsLoading(false);
                }
            };

            const handleCreateSubdomain = async (e) => {
                e.preventDefault();
                if (!subdomainName || !targetContent) {
                    showToast("Nama subdomain dan target wajib diisi!", "error");
                    return;
                }
                
                setRecordsLoading(true);
                try {
                    const recordData = {
                        type: dnsType,
                        name: subdomainName.trim(),
                        content: targetContent.trim(),
                        ttl: parseInt(ttlValue),
                        proxied: dnsType === "A" || dnsType === "AAAA" || dnsType === "CNAME" ? isProxied : false
                    };

                    const response = await fetch(CONFIG_APPS_SCRIPT_URL, {
                        method: "POST",
                        mode: "cors",
                        credentials: "omit",
                        redirect: "follow",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            action: "create",
                            appPassword: appPassword.trim(),
                            recordData: recordData
                        })
                    });

                    const text = await response.text();
                    const data = JSON.parse(text);

                    if (data.success) {
                        setSubdomainName("");
                        setTargetContent("");
                        showToast(`Subdomain "${recordData.name}" berhasil dibuat!`);
                        fetchDnsRecords();
                    } else {
                        showToast("Gagal: " + (data.errors && data.errors[0] ? data.errors[0].message : "Error"), "error");
                        setRecordsLoading(false);
                    }
                } catch (err) {
                    showToast("Koneksi gagal: " + err.message, "error");
                    setRecordsLoading(false);
                }
            };

            const triggerDeleteConfirm = (id, name) => {
                setConfirmModal({ show: true, recordId: id, recordName: name });
            };

            const executeDeleteRecord = async () => {
                const recordId = confirmModal.recordId;
                const recordName = confirmModal.recordName;
                setConfirmModal({ show: false, recordId: null, recordName: "" });

                setRecordsLoading(true);
                try {
                    const response = await fetch(CONFIG_APPS_SCRIPT_URL, {
                        method: "POST",
                        mode: "cors",
                        credentials: "omit",
                        redirect: "follow",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            action: "delete",
                            appPassword: appPassword.trim(),
                            recordId: recordId
                        })
                    });

                    const text = await response.text();
                    const data = JSON.parse(text);

                    if (data.success) {
                        showToast(`Subdomain "${recordName}" berhasil dihapus.`);
                        fetchDnsRecords();
                    } else {
                        showToast("Gagal menghapus: " + (data.errors && data.errors[0] ? data.errors[0].message : "Error"), "error");
                        setRecordsLoading(false);
                    }
                } catch (err) {
                    showToast("Koneksi gagal: " + err.message, "error");
                    setRecordsLoading(false);
                }
            };

            const filteredRecords = records.filter(rec => {
                const matchesSearch = rec.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      rec.content.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesType = filterType === "ALL" || rec.type === filterType;
                return matchesSearch && matchesType;
            });

            if (!isLoggedIn) {
                return (
                    <div className="max-w-md w-full bg-gray-900 rounded-2xl shadow-2xl p-8 border border-gray-800 relative overflow-hidden">
                        <div className="absolute top-0 left-1/4 w-1/2 h-1 bg-gradient-to-r from-transparent via-orange-500 to-transparent opacity-60"></div>

                        <div className="text-center mb-6">
                            <div className="inline-flex items-center justify-center p-3.5 bg-orange-500/10 text-cf-brand rounded-2xl mb-4 border border-orange-500/20">
                                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>
                            <h1 className="text-2xl font-extrabold text-white tracking-tight">Cloudflare Manager</h1>
                            <p className="text-slate-400 text-xs mt-2 leading-relaxed">Gunakan sandi keamanan Anda untuk memproses data Cloudflare secara aman.</p>
                        </div>

                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                                <label className="block text-slate-400 text-xs font-semibold tracking-wider uppercase mb-2">Sandi Keamanan</label>
                                <input 
                                    type="password"
                                    value={appPassword}
                                    onChange={(e) => setAppPassword(e.target.value)}
                                    placeholder="Masukkan Sandi"
                                    className="w-full p-3 bg-slate-950 border border-gray-800 rounded-xl text-white placeholder-slate-700 focus:border-cf-brand focus:ring-1 focus:ring-cf-brand outline-none transition-all text-sm font-medium"
                                />
                            </div>

                            <div className="flex items-center">
                                <input 
                                    type="checkbox" 
                                    id="remember" 
                                    checked={rememberMe}
                                    onChange={(e) => setRememberMe(e.target.checked)}
                                    className="rounded border-gray-800 text-cf-brand focus:ring-cf-brand bg-slate-950"
                                />
                                <label htmlFor="remember" className="ml-2.5 text-slate-400 text-xs cursor-pointer select-none font-medium">Ingat saya di perangkat ini</label>
                            </div>

                            {error && (
                                <div className="p-3 bg-rose-950/40 border border-rose-500/20 rounded-xl text-rose-400 text-xs leading-relaxed font-medium">
                                    ⚠️ {error}
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full py-3 bg-cf-brand hover:bg-cf-brandHover text-white text-sm font-bold rounded-xl transition-all shadow-lg shadow-orange-500/10 disabled:opacity-50 flex items-center justify-center gap-2"
                            >
                                {loading ? "Memverifikasi..." : "Masuk Dasbor Keamanan"}
                            </button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="w-full max-w-6xl mx-auto space-y-6 py-6 px-4 relative">
                    
                    {/* UI Toast Notifikasi Kustom */}
                    {toast.show && (
                        <div className={`fixed top-4 right-4 z-50 flex items-center p-4 rounded-xl shadow-2xl border text-sm transition-all duration-300 ${
                            toast.type === "success" ? "bg-emerald-950 border-emerald-500/30 text-emerald-300" :
                            toast.type === "error" ? "bg-rose-950 border-rose-500/30 text-rose-300" :
                            "bg-slate-900 border-slate-800 text-slate-300"
                        }`}>
                            <span className="mr-2">{toast.type === "success" ? "✨" : toast.type === "error" ? "❌" : "ℹ️"}</span>
                            {toast.message}
                        </div>
                    )}

                    {/* UI Modal Konfirmasi Hapus Kustom */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                            <div className="bg-gray-900 border border-gray-800 max-w-md w-full p-6 rounded-2xl shadow-2xl space-y-4">
                                <h3 className="text-base font-bold text-white">⚠️ Konfirmasi Penghapusan</h3>
                                <p className="text-slate-400 text-xs leading-relaxed">
                                    Apakah Anda benar-benar yakin ingin menghapus subdomain <strong className="text-white font-semibold">{confirmModal.recordName}</strong>? Tindakan ini tidak dapat dibatalkan.
                                </p>
                                <div className="flex gap-3 justify-end pt-2">
                                    <button 
                                        onClick={() => setConfirmModal({ show: false, recordId: null, recordName: "" })}
                                        className="px-4 py-2 bg-slate-950 hover:bg-slate-900 border border-gray-800 rounded-lg text-xs font-semibold text-slate-400"
                                    >
                                        Batal
                                    </button>
                                    <button 
                                        onClick={executeDeleteRecord}
                                        className="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-xs font-bold transition-all"
                                    >
                                        Hapus Permanen
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header Dasbor */}
                    <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center p-6 bg-gray-900 border border-gray-800 rounded-2xl gap-4 shadow-xl">
                        <div className="flex items-center gap-3.5">
                            <span className="text-4xl filter drop-shadow-sm">⚡</span>
                            <div>
                                <h1 className="text-xl font-extrabold text-white tracking-tight">Subdomain Creator Pro</h1>
                                <p className="text-slate-400 text-xs mt-1">Google Apps Script Secure Bridge & Cloudflare API (Mode Zero-Config)</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3 w-full sm:w-auto">
                            <button 
                                onClick={fetchDnsRecords}
                                className="p-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-xs font-semibold flex items-center gap-1.5 transition-all border border-slate-700/50"
                                title="Segarkan Data"
                            >
                                🔄 Segarkan
                            </button>
                            <button 
                                onClick={handleLogout}
                                className="p-2.5 bg-rose-950/20 hover:bg-rose-950/40 text-rose-400 border border-rose-900/30 rounded-xl text-xs font-semibold transition-all"
                            >
                                Keluar Aplikasi 🚪
                            </button>
                        </div>
                    </header>

                    {/* Layout Utama 2 Kolom */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* Kolom Kiri: Form Buat Record */}
                        <div className="space-y-6">
                            <div className="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                                <h2 className="text-sm font-bold text-white mb-4 flex items-center gap-2">
                                    🌐 Buat Subdomain Baru
                                </h2>
                                <form onSubmit={handleCreateSubdomain} className="space-y-4">
                                    <div>
                                        <label className="block text-slate-400 text-[10px] font-bold tracking-wider uppercase mb-1.5">Tipe Record</label>
                                        <select 
                                            value={dnsType} 
                                            onChange={(e) => setDnsType(e.target.value)}
                                            className="w-full p-2.5 bg-slate-950 border border-gray-800 rounded-lg text-xs font-semibold text-slate-300 focus:border-cf-brand outline-none"
                                        >
                                            <option value="A">A (IPv4 Address)</option>
                                            <option value="AAAA">AAAA (IPv6 Address)</option>
                                            <option value="CNAME">CNAME (Alias)</option>
                                            <option value="TXT">TXT (Text)</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-slate-400 text-[10px] font-bold tracking-wider uppercase mb-1.5">Nama Subdomain</label>
                                        <div className="flex items-center bg-slate-950 border border-gray-800 rounded-lg overflow-hidden focus-within:border-cf-brand">
                                            <input 
                                                type="text" 
                                                value={subdomainName}
                                                onChange={(e) => setSubdomainName(e.target.value)}
                                                placeholder="contoh: blog, api, panel"
                                                className="w-full p-2.5 bg-transparent text-xs text-slate-300 placeholder-slate-700 outline-none font-medium"
                                            />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-slate-400 text-[10px] font-bold tracking-wider uppercase mb-1.5">Target Isi / Konten</label>
                                        <input 
                                            type="text" 
                                            value={targetContent}
                                            onChange={(e) => setTargetContent(e.target.value)}
                                            placeholder={dnsType === "CNAME" ? "contoh.github.io" : "contoh: 192.168.1.1"}
                                            className="w-full p-2.5 bg-slate-950 border border-gray-800 rounded-lg text-xs text-slate-300 placeholder-slate-700 focus:border-cf-brand outline-none"
                                        />
                                    </div>

                                    {/* Proxy Cloudflare & TTL */}
                                    <div className="flex items-center justify-between p-3 bg-slate-950 rounded-xl border border-gray-800/80">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xl filter drop-shadow">☁️</span>
                                            <div>
                                                <div className="text-[11px] font-bold text-slate-300">Cloudflare Proxy</div>
                                                <div className="text-[9px] text-slate-550 font-medium">Lewatkan trafik via Cloudflare</div>
                                            </div>
                                        </div>
                                        <button
                                            type="button"
                                            disabled={dnsType === "TXT"}
                                            onClick={() => setIsProxied(!isProxied)}
                                            className={`px-3 py-1.5 rounded-lg text-[10px] font-extrabold tracking-wide uppercase transition-all ${
                                                dnsType === "TXT" ? "bg-slate-900 text-slate-700 cursor-not-allowed" :
                                                isProxied ? "bg-orange-500/10 text-orange-400 border border-orange-500/25 shadow-sm" : "bg-slate-900 text-slate-400 border border-slate-800"
                                            }`}
                                        >
                                            {dnsType === "TXT" ? "N/A" : isProxied ? "Proxied" : "DNS Only"}
                                        </button>
                                    </div>

                                    <div>
                                        <label className="block text-slate-400 text-[10px] font-bold tracking-wider uppercase mb-1.5">TTL (Time to Live)</label>
                                        <select 
                                            value={ttlValue} 
                                            onChange={(e) => setTtlValue(e.target.value)}
                                            className="w-full p-2 bg-slate-950 border border-gray-800 rounded-lg text-xs text-slate-400 focus:border-cf-brand outline-none font-medium"
                                        >
                                            <option value="1">Auto</option>
                                            <option value="60">1 Menit</option>
                                            <option value="300">5 Menit</option>
                                            <option value="3600">1 Jam</option>
                                        </select>
                                    </div>

                                    <button
                                        type="submit"
                                        disabled={recordsLoading}
                                        className="w-full py-3 bg-cf-brand hover:bg-cf-brandHover text-white text-xs font-extrabold uppercase tracking-wider rounded-xl transition-all shadow-lg shadow-orange-500/10 flex items-center justify-center gap-2 disabled:opacity-55"
                                    >
                                        {recordsLoading ? "Sedang Memproses..." : "Buat Subdomain Sekarang"}
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* Kolom Kanan: Tabel Subdomain */}
                        <div className="lg:col-span-2 bg-gray-900 rounded-2xl border border-gray-800 p-6 flex flex-col justify-between shadow-xl">
                            <div>
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                                    <h2 className="text-sm font-bold text-white flex items-center gap-2">
                                        📊 Daftar Subdomain Cloudflare
                                    </h2>
                                    {/* Filter Controls */}
                                    <div className="flex gap-2.5 w-full sm:w-auto">
                                        <input 
                                            type="text" 
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            placeholder="Cari domain..."
                                            className="p-2 bg-slate-950 border border-gray-800 rounded-lg text-xs text-slate-300 placeholder-slate-700 outline-none focus:border-cf-brand w-full sm:w-48 font-medium"
                                        />
                                        <select 
                                            value={filterType} 
                                            onChange={(e) => setFilterType(e.target.value)}
                                            className="p-2 bg-slate-950 border border-gray-800 rounded-lg text-xs text-slate-400 font-semibold outline-none"
                                        >
                                            <option value="ALL">Semua</option>
                                            <option value="A">A</option>
                                            <option value="AAAA">AAAA</option>
                                            <option value="CNAME">CNAME</option>
                                            <option value="TXT">TXT</option>
                                        </select>
                                    </div>
                                </div>

                                {recordsError && (
                                    <div className="p-4 bg-rose-950/20 border border-rose-900/30 rounded-xl text-rose-400 text-xs mb-4">
                                        ⚠️ {recordsError}
                                    </div>
                                )}

                                {recordsLoading && records.length === 0 ? (
                                    <div className="text-center py-16">
                                        <svg className="animate-spin h-8 w-8 text-cf-brand mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        <p className="text-slate-400 text-xs font-semibold">Mengambil data subdomain langsung via Google Server...</p>
                                    </div>
                                ) : filteredRecords.length === 0 ? (
                                    <div className="text-center py-16 border border-dashed border-slate-800 rounded-xl">
                                        <span className="text-3xl block mb-2">📭</span>
                                        <p className="text-slate-400 text-xs font-semibold">Tidak ada record DNS yang ditemukan.</p>
                                        <p className="text-slate-500 text-[10px] mt-1.5 leading-relaxed">Gunakan form di samping kiri untuk membuat subdomain baru.</p>
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto rounded-xl border border-gray-800/80 bg-slate-950">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-900/60 text-slate-400 text-[10px] font-bold uppercase tracking-wider border-b border-gray-850">
                                                    <th className="p-3.5">Tipe</th>
                                                    <th className="p-3.5">Nama Domain</th>
                                                    <th className="p-3.5">Konten Target</th>
                                                    <th className="p-3.5">Proxy</th>
                                                    <th className="p-3.5 text-center">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-900 text-xs">
                                                {filteredRecords.map((rec) => (
                                                    <tr key={rec.id} className="hover:bg-slate-900/30 transition-all text-slate-300">
                                                        <td className="p-3.5">
                                                            <span className="px-2 py-1 bg-slate-900 border border-slate-800 text-[10px] font-extrabold rounded text-slate-300 tracking-wide">
                                                                {rec.type}
                                                            </span>
                                                        </td>
                                                        <td className="p-3.5 font-bold text-white break-all">{rec.name}</td>
                                                        <td className="p-3.5 font-mono text-slate-400 break-all">{rec.content}</td>
                                                        <td className="p-3.5">
                                                            {rec.proxied ? (
                                                                <span className="text-orange-400 flex items-center gap-1 font-bold text-[10px] uppercase tracking-wider" title="Trafik dilewatkan Cloudflare">
                                                                    ☁️ Proxied
                                                                </span>
                                                            ) : (
                                                                <span className="text-slate-500 flex items-center gap-1 text-[10px] uppercase tracking-wider" title="Trafik langsung ke IP">
                                                                    ◽ DNS Only
                                                                </span>
                                                            )}
                                                        </td>
                                                        <td className="p-3.5 text-center">
                                                            <button
                                                                onClick={() => triggerDeleteConfirm(rec.id, rec.name)}
                                                                disabled={recordsLoading}
                                                                className="px-2.5 py-1.5 bg-rose-950/20 hover:bg-rose-950/40 text-rose-400 border border-rose-900/30 rounded-lg hover:border-rose-500 transition-all text-[11px] font-bold"
                                                            >
                                                                Hapus
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>

                            <div className="mt-6 pt-4 border-t border-gray-800/80 flex flex-col sm:flex-row justify-between text-[11px] text-slate-500 font-medium gap-2">
                                <div>Menampilkan {filteredRecords.length} dari total {records.length} record DNS</div>
                                <div className="flex items-center gap-1.5">
                                    Status Jembatan: 
                                    <span className="text-emerald-400 font-extrabold flex items-center gap-1">
                                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                                        Terhubung Secara Aman (Server-Side)
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>

    <!-- Footer -->
    <footer class="py-6 text-center text-[11px] text-slate-500 border-t border-gray-900">
        <p>&copy; 2026 Cloudflare Subdomain Manager. Secured with Zero-Config Server Bridge.</p>
    </footer>
</body>
</html>
