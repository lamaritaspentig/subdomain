<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF Subdomain Manager - Secure Console</title>
    <!-- Mengimpor Tailwind CSS untuk desain responsif dan premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Mengimpor Font modern Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0b111e; 
            color: #94a3b8; 
        }
        /* Custom scrollbar bergaya gelap */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body class="min-h-screen selection:bg-orange-500/30 selection:text-orange-200">
    <!-- Kontainer React Root -->
    <div id="root"></div>

    <!-- Pustaka Inti React 18 & Babel Compiler -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        // 1. TEMPELKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const CONFIG_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIVztg9DEorq9cVW3UOePGYxNPykgbBjewh72U3udyMW_9PKxhU0ceqQTXKRskwmWxmQ/exec";
        
        // 2. UBAH KATA SANDI LOGIN ADMIN ANDA DI SINI (Default: admin123)
        const CONFIG_ADMIN_PASSWORD = "admin12345";
        
        const { useState, useEffect } = React;

        // Komponen Toast Notification untuk pesan melayang yang interaktif
        function Toast({ message, type, onClose }) {
            useEffect(() => {
                const timer = setTimeout(onClose, 5000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const isSuccess = type === 'success';
            const isError = type === 'error';

            return (
                <div className={`fixed bottom-6 right-6 z-50 flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transition-all transform duration-300 translate-y-0 scale-100 ${
                    isSuccess ? 'bg-emerald-950/90 border-emerald-500/30 text-emerald-300' :
                    isError ? 'bg-rose-950/90 border-rose-500/30 text-rose-300' :
                    'bg-slate-900/90 border-slate-700 text-slate-300'
                }`}>
                    {isSuccess && (
                        <svg className="w-5 h-5 text-emerald-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    )}
                    {isError && (
                        <svg className="w-5 h-5 text-rose-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    )}
                    <span className="text-sm font-medium">{message}</span>
                    <button onClick={onClose} className="hover:text-white ml-2">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            );
        }

        function App() {
            // State Autentikasi Frontend
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [inputPassword, setInputPassword] = useState("");
            const [showPassword, setShowPassword] = useState(false);
            const [loginError, setLoginError] = useState("");

            // State Dasbor Utama
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(false);
            const [btnLoading, setBtnLoading] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [toast, setToast] = useState(null);
            
            // State Kredensial Cloudflare
            const [cfToken, setCfToken] = useState("");
            const [cfZone, setCfZone] = useState("");
            const [isCredentialsSaved, setIsCredentialsSaved] = useState(false);

            // State Form Pembuatan Subdomain
            const [subdomain, setSubdomain] = useState("");
            const [domainUtama, setDomainUtama] = useState("");
            const [recordType, setRecordType] = useState("A");
            const [targetValue, setTargetValue] = useState("");
            const [proxied, setProxied] = useState(true);
            const [ttl, setTtl] = useState(1); // 1 = Auto

            // State Konfirmasi Hapus Data
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const [confirmDeleteName, setConfirmDeleteName] = useState("");

            const showToast = (message, type = 'info') => {
                setToast({ message, type });
            };

            // Memeriksa status login dan kredensial saat aplikasi dibuka
            useEffect(() => {
                // Periksa sesi aktif di sessionStorage agar tidak perlu re-login terus menerus selama browser terbuka
                const sessionStatus = sessionStorage.getItem("admin_session_active");
                if (sessionStatus === "true") {
                    setIsLoggedIn(true);
                }

                const storedToken = localStorage.getItem("cf_api_token") || "";
                const storedZone = localStorage.getItem("cf_zone_id") || "";
                setCfToken(storedToken);
                setCfZone(storedZone);
                
                if (storedToken && storedZone) {
                    setIsCredentialsSaved(true);
                }
            }, []);

            // Memuat ulang data secara otomatis ketika kredensial terverifikasi aktif
            useEffect(() => {
                if (isLoggedIn && isCredentialsSaved && cfToken && cfZone) {
                    fetchRecords();
                }
            }, [isLoggedIn, isCredentialsSaved]);

            const handleLoginSubmit = (e) => {
                e.preventDefault();
                if (inputPassword === CONFIG_ADMIN_PASSWORD) {
                    setIsLoggedIn(true);
                    setLoginError("");
                    sessionStorage.setItem("admin_session_active", "true");
                    showToast("Login berhasil! Selamat datang di dasbor aman.", "success");
                } else {
                    setLoginError("Kata sandi yang Anda masukkan salah!");
                    showToast("Login gagal, periksa kembali sandi Anda.", "error");
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setInputPassword("");
                sessionStorage.removeItem("admin_session_active");
                showToast("Anda telah keluar dari dasbor dengan aman.", "info");
            };

            const handleSaveCredentials = (e) => {
                e.preventDefault();
                if (!cfToken.trim() || !cfZone.trim()) {
                    showToast("Harap isi kedua kolom kredensial Cloudflare!", "error");
                    return;
                }
                localStorage.setItem("cf_api_token", cfToken.trim());
                localStorage.setItem("cf_zone_id", cfZone.trim());
                setIsCredentialsSaved(true);
                showToast("Kredensial disimpan dengan aman di sistem lokal browser Anda!", "success");
            };

            const handleClearCredentials = () => {
                localStorage.removeItem("cf_api_token");
                localStorage.removeItem("cf_zone_id");
                setCfToken("");
                setCfZone("");
                setIsCredentialsSaved(false);
                setRecords([]);
                showToast("Kredensial dihapus. Silakan hubungkan kembali.", "info");
            };

            const fetchRecords = async () => {
                if (!cfToken || !cfZone) {
                    showToast("Kredensial Cloudflare belum dikonfigurasi!", "error");
                    return;
                }
                setLoading(true);
                try {
                    const response = await fetch(CONFIG_APPS_SCRIPT_URL, {
                        method: "POST",
                        mode: "cors",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({ 
                            action: "list",
                            apiToken: cfToken,
                            zoneId: cfZone
                        })
                    });
                    
                    const data = await response.json();
                    if (data.success) {
                        setRecords(data.result || []);
                        if (data.result && data.result.length > 0) {
                            const sampleName = data.result[0].zone_name;
                            if (sampleName) setDomainUtama(sampleName);
                        }
                    } else {
                        const errMsg = data.errors?.[0]?.message || "Gagal memuat daftar subdomain.";
                        showToast(errMsg, "error");
                    }
                } catch (e) {
                    showToast("Koneksi Apps Script terputus atau URL salah!", "error");
                    console.error(e);
                } finally {
                    setLoading(false);
                }
            };

            const handleCreateRecord = async (e) => {
                e.preventDefault();
                if (!isCredentialsSaved) {
                    showToast("Simpan Kredensial Cloudflare Anda terlebih dahulu!", "error");
                    return;
                }
                if (!subdomain || !domainUtama || !targetValue) {
                    showToast("Harap lengkapi semua isian formulir!", "error");
                    return;
                }

                setBtnLoading(true);
                const fullDomainName = `${subdomain.trim().toLowerCase()}.${domainUtama.trim().toLowerCase()}`;
                
                const recordData = {
                    type: recordType,
                    name: fullDomainName,
                    content: targetValue.trim(),
                    ttl: parseInt(ttl),
                    proxied: recordType === "CNAME" || recordType === "A" ? proxied : false
                };

                try {
                    const response = await fetch(CONFIG_APPS_SCRIPT_URL, {
                        method: "POST",
                        mode: "cors",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            action: "create",
                            apiToken: cfToken,
                            zoneId: cfZone,
                            recordData: recordData
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        showToast(`Sukses! Subdomain ${fullDomainName} berhasil diaktifkan.`, "success");
                        setSubdomain("");
                        setTargetValue("");
                        fetchRecords();
                    } else {
                        const errMsg = data.errors?.[0]?.message || "Gagal membuat subdomain.";
                        showToast(errMsg, "error");
                    }
                } catch (err) {
                    showToast("Koneksi gagal saat membuat record baru.", "error");
                    console.error(err);
                } finally {
                    setBtnLoading(false);
                }
            };

            const handleDeleteRecord = async (recordId) => {
                setLoading(true);
                setConfirmDeleteId(null);
                try {
                    const response = await fetch(CONFIG_APPS_SCRIPT_URL, {
                        method: "POST",
                        mode: "cors",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({
                            action: "delete",
                            apiToken: cfToken,
                            zoneId: cfZone,
                            recordId: recordId
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        showToast("Subdomain berhasil dihapus secara permanen.", "success");
                        fetchRecords();
                    } else {
                        const errMsg = data.errors?.[0]?.message || "Gagal menghapus subdomain.";
                        showToast(errMsg, "error");
                        setLoading(false);
                    }
                } catch (err) {
                    showToast("Koneksi gagal saat proses penghapusan.", "error");
                    console.error(err);
                    setLoading(false);
                }
            };

            const filteredRecords = records.filter(rec => 
                rec.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                rec.content.toLowerCase().includes(searchQuery.toLowerCase()) ||
                rec.type.toLowerCase().includes(searchQuery.toLowerCase())
            );

            // JIKA BELUM LOGIN: Render Halaman Gerbang Masuk (Login Screen)
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-[#070b13]">
                        <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-orange-600/5 to-transparent pointer-events-none"></div>
                        <div className="absolute top-1/4 left-1/2 -translate-x-1/2 w-[400px] h-[400px] bg-orange-600/5 rounded-full blur-[120px] pointer-events-none"></div>
                        
                        <div className="max-w-md w-full bg-[#0f172a] border border-slate-800 rounded-3xl p-8 shadow-2xl relative overflow-hidden transition-all duration-300">
                            <div className="text-center mb-8 relative">
                                <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-tr from-orange-600 to-amber-500 flex items-center justify-center shadow-xl shadow-orange-500/20">
                                    <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                    </svg>
                                </div>
                                <h1 className="text-xl font-bold text-white tracking-wide">CF DNS Manager</h1>
                                <p className="text-xs text-slate-500 mt-1.5 font-medium">Konsol Keamanan Akses Terbatas</p>
                            </div>

                            {loginError && (
                                <div className="mb-5 p-3.5 bg-rose-950/40 border border-rose-500/20 rounded-xl text-xs text-rose-400 font-medium flex items-center gap-2">
                                    <svg className="w-4 h-4 shrink-0 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                    </svg>
                                    {loginError}
                                </div>
                            )}

                            <form onSubmit={handleLoginSubmit} className="space-y-5">
                                <div className="space-y-1.5">
                                    <label className="block text-xs font-semibold text-slate-400">Kata Sandi Dasbor</label>
                                    <div className="relative flex items-center bg-slate-950/80 border border-slate-800 rounded-xl focus-within:border-orange-500/50 transition-colors">
                                        <input 
                                            type={showPassword ? "text" : "password"}
                                            required
                                            placeholder="Masukkan sandi keamanan"
                                            value={inputPassword}
                                            onChange={(e) => setInputPassword(e.target.value)}
                                            className="w-full bg-transparent px-4 py-3 text-sm text-slate-200 outline-none placeholder:text-slate-600"
                                        />
                                        <button 
                                            type="button"
                                            onClick={() => setShowPassword(!showPassword)}
                                            className="px-3.5 text-slate-500 hover:text-slate-300 transition-colors focus:outline-none"
                                        >
                                            {showPassword ? (
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                                </svg>
                                            ) : (
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                                </svg>
                                            )}
                                        </button>
                                    </div>
                                </div>

                                <button 
                                    type="submit"
                                    className="w-full bg-gradient-to-r from-orange-600 to-amber-500 hover:from-orange-500 hover:to-amber-400 text-white font-bold text-sm py-3 px-4 rounded-xl shadow-lg shadow-orange-500/10 transition-all active:scale-[0.98] flex items-center justify-center gap-2"
                                >
                                    Masuk ke Dashboard
                                </button>
                            </form>

                            <div className="mt-6 text-center border-t border-slate-800/60 pt-5">
                                <span className="text-[10px] text-slate-600 font-semibold uppercase tracking-wider block mb-1">Panduan Kata Sandi</span>
                                <p className="text-[11px] text-slate-500 leading-relaxed">
                                    Sandi default aplikasi Anda saat ini adalah <code className="bg-slate-950 px-1.5 py-0.5 rounded text-orange-400 font-bold font-mono">admin123</code>.
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    {/* Header Navigasi */}
                    <header className="border-b border-slate-800 bg-slate-900/60 backdrop-blur-md sticky top-0 z-30">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded-xl bg-gradient-to-tr from-orange-600 to-amber-500 flex items-center justify-center shadow-lg shadow-orange-500/20">
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-sm sm:text-base font-bold text-white tracking-wide">CF DNS Manager</h1>
                                    <p className="text-[10px] text-slate-500 font-semibold tracking-wider uppercase">Console Aman</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <div className="hidden sm:flex items-center gap-2 text-xs text-slate-400 font-medium bg-slate-800/80 px-3 py-1.5 rounded-full border border-slate-700/60">
                                    <span className="flex h-2 w-2 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                    </span>
                                    {isCredentialsSaved ? "Koneksi Terhubung" : "Menunggu Kredensial"}
                                </div>

                                <button 
                                    onClick={handleLogout}
                                    className="text-xs font-bold text-rose-400 hover:text-white bg-rose-950/20 hover:bg-rose-600 border border-rose-500/20 rounded-lg px-3.5 py-1.5 transition-all flex items-center gap-1.5"
                                >
                                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                    Keluar
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Layout Utama Dasbor */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow w-full">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                            
                            {/* Panel Kiri */}
                            <div className="lg:col-span-5 space-y-6">
                                
                                {/* CARD 1: Konfigurasi Kredensial */}
                                <section className="bg-slate-900 border border-slate-800/80 rounded-2xl p-6 shadow-xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-16 h-16 bg-blue-600/5 rounded-full blur-xl"></div>
                                    <h2 className="text-base font-bold text-white mb-1 flex items-center gap-2">
                                        <span className="w-1 h-4 bg-blue-500 rounded"></span>
                                        🔑 Kredensial Cloudflare
                                    </h2>
                                    <p className="text-xs text-slate-500 mb-4">Disimpan terenkripsi di penyimpanan browser Anda sendiri.</p>

                                    {isCredentialsSaved ? (
                                        <div className="p-4 bg-emerald-950/20 border border-emerald-500/20 rounded-xl space-y-3">
                                            <div className="flex items-center gap-2 text-emerald-400 text-xs font-semibold">
                                                <svg className="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                                </svg>
                                                Kredensial Aktif & Siap Beroperasi
                                            </div>
                                            <p className="text-[11px] text-slate-400 truncate"><strong>Zone ID:</strong> {cfZone}</p>
                                            <button 
                                                onClick={handleClearCredentials}
                                                className="w-full bg-slate-800 hover:bg-slate-700/80 text-xs text-slate-300 font-bold py-2 px-3 rounded-lg border border-slate-700/50 transition-colors"
                                            >
                                                Lepas Kredensial
                                            </button>
                                        </div>
                                    ) : (
                                        <form onSubmit={handleSaveCredentials} className="space-y-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-400 mb-1.5">Cloudflare API Token</label>
                                                <input 
                                                    type="password" 
                                                    required
                                                    placeholder="Tempel API Token Cloudflare Anda"
                                                    value={cfToken}
                                                    onChange={(e) => setCfToken(e.target.value)}
                                                    className="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 placeholder:text-slate-600 transition-colors"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-400 mb-1.5">Cloudflare Zone ID</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    placeholder="Tempel Zone ID Domain Anda"
                                                    value={cfZone}
                                                    onChange={(e) => setCfZone(e.target.value)}
                                                    className="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 placeholder:text-slate-600 transition-colors"
                                                />
                                            </div>
                                            <button 
                                                type="submit"
                                                className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs py-2.5 px-4 rounded-xl shadow-lg shadow-blue-500/10 transition-colors"
                                            >
                                                Hubungkan & Simpan Kredensial
                                            </button>
                                        </form>
                                    )}
                                </section>

                                {/* CARD 2: Form Buat Subdomain */}
                                <section className={`bg-slate-900 border border-slate-800/80 rounded-2xl p-6 shadow-xl relative overflow-hidden transition-all ${!isCredentialsSaved ? 'opacity-40 pointer-events-none' : 'opacity-100'}`}>
                                    <div className="absolute top-0 right-0 w-24 h-24 bg-orange-600/5 rounded-full blur-2xl"></div>
                                    
                                    <h2 className="text-base font-bold text-white mb-1 flex items-center gap-2">
                                        <span className="w-1 h-4 bg-orange-500 rounded"></span>
                                        Buat Subdomain Baru
                                    </h2>
                                    <p className="text-xs text-slate-500 mb-6">Tambahkan record DNS A, CNAME, atau AAAA dengan cepat.</p>

                                    <form onSubmit={handleCreateRecord} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-400 mb-1.5">Nama Subdomain</label>
                                            <div className="flex rounded-lg shadow-sm border border-slate-800 bg-slate-950/80 overflow-hidden focus-within:border-orange-500/50 focus-within:ring-1 focus-within:ring-orange-500/50 transition-colors">
                                                <input 
                                                    type="text" 
                                                    required
                                                    placeholder="contoh: blog, api, panel"
                                                    value={subdomain}
                                                    onChange={(e) => setSubdomain(e.target.value)}
                                                    className="w-full bg-transparent px-3 py-2.5 text-sm text-slate-200 outline-none placeholder:text-slate-600"
                                                />
                                                <span className="flex items-center px-3 bg-slate-900 border-l border-slate-800 text-xs font-semibold text-slate-500">
                                                    .
                                                </span>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-semibold text-slate-400 mb-1.5">Domain Utama</label>
                                            <input 
                                                type="text" 
                                                required
                                                placeholder="contoh: domainanda.com"
                                                value={domainUtama}
                                                onChange={(e) => setDomainUtama(e.target.value)}
                                                className="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-orange-500/50 focus:ring-1 focus:ring-orange-500/50 placeholder:text-slate-600 transition-colors"
                                            />
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-400 mb-1.5">Tipe DNS</label>
                                                <select 
                                                    value={recordType}
                                                    onChange={(e) => setRecordType(e.target.value)}
                                                    className="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-orange-500/50 focus:ring-1 focus:ring-orange-500/50 transition-colors cursor-pointer"
                                                >
                                                    <option value="A">A (IPv4)</option>
                                                    <option value="CNAME">CNAME (Alias)</option>
                                                    <option value="AAAA">AAAA (IPv6)</option>
                                                </select>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-semibold text-slate-400 mb-1.5">TTL</label>
                                                <select 
                                                    value={ttl}
                                                    onChange={(e) => setTtl(e.target.value)}
                                                    className="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-orange-500/50 focus:ring-1 focus:ring-orange-500/50 transition-colors cursor-pointer"
                                                >
                                                    <option value="1">Automatic</option>
                                                    <option value="60">1 Menit</option>
                                                    <option value="300">5 Menit</option>
                                                    <option value="3600">1 Jam</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-semibold text-slate-400 mb-1.5">
                                                {recordType === "A" ? "IP Target (IPv4)" : recordType === "AAAA" ? "IP Target (IPv6)" : "Domain Target (Alias)"}
                                            </label>
                                            <input 
                                                type="text" 
                                                required
                                                placeholder={recordType === "CNAME" ? "contoh: ghs.google.com" : "contoh: 192.168.1.1"}
                                                value={targetValue}
                                                onChange={(e) => setTargetValue(e.target.value)}
                                                className="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-orange-500/50 focus:ring-1 focus:ring-orange-500/50 placeholder:text-slate-600 transition-colors"
                                            />
                                        </div>

                                        {(recordType === "A" || recordType === "CNAME") && (
                                            <div className="flex items-center justify-between p-3.5 bg-slate-950/40 rounded-xl border border-slate-800/60">
                                                <div className="flex flex-col gap-0.5">
                                                    <span className="text-xs font-semibold text-slate-300">Cloudflare Proxy</span>
                                                    <span className="text-[10px] text-slate-500">Sembunyikan IP server asli Anda</span>
                                                </div>
                                                <button 
                                                    type="button"
                                                    onClick={() => setProxied(!proxied)}
                                                    className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-300 ${
                                                        proxied ? 'bg-orange-500' : 'bg-slate-800'
                                                    }`}
                                                >
                                                    <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-300 ${
                                                        proxied ? 'translate-x-6' : 'translate-x-1'
                                                    }`} />
                                                </button>
                                            </div>
                                        )}

                                        <button 
                                            type="submit" 
                                            disabled={btnLoading}
                                            className="w-full bg-gradient-to-r from-orange-600 to-amber-500 hover:from-orange-500 hover:to-amber-400 text-white font-bold text-sm py-3 px-4 rounded-xl shadow-lg shadow-orange-500/10 transition-all active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none flex items-center justify-center gap-2 mt-2"
                                        >
                                            {btnLoading ? (
                                                <>
                                                    <svg className="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                                                    </svg>
                                                    Proses Pembuatan...
                                                </>
                                            ) : "Daftarkan Subdomain"}
                                        </button>
                                    </form>
                                </section>
                            </div>

                            {/* Panel Kanan: Daftar Record */}
                            <section className="lg:col-span-7 bg-slate-900 border border-slate-800/80 rounded-2xl p-6 shadow-xl flex flex-col min-h-[450px]">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                                    <div>
                                        <h2 className="text-base font-bold text-white flex items-center gap-2">
                                            <span className="w-1 h-4 bg-orange-500 rounded"></span>
                                            Daftar Subdomain Aktif
                                        </h2>
                                        <p className="text-xs text-slate-500">Menampilkan seluruh data record DNS yang terhubung.</p>
                                    </div>
                                    
                                    <div className="relative">
                                        <input 
                                            type="text"
                                            placeholder="Cari subdomain..."
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            className="w-full sm:w-60 bg-slate-950 border border-slate-800 rounded-lg pl-9 pr-3 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-orange-500/50 focus:ring-1 focus:ring-orange-500/50 transition-colors placeholder:text-slate-600"
                                        />
                                        <svg className="w-4 h-4 text-slate-600 absolute left-3 top-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                        </svg>
                                    </div>
                                </div>

                                {!isCredentialsSaved ? (
                                    <div className="flex-grow flex flex-col items-center justify-center text-center py-12 border-2 border-dashed border-slate-800 rounded-xl p-8 bg-slate-950/20">
                                        <svg className="w-10 h-10 text-slate-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                        </svg>
                                        <p className="text-sm font-semibold text-slate-400">Kredensial Belum Terisi</p>
                                        <p className="text-xs text-slate-600 mt-1 max-w-xs">Silakan hubungkan API Token & Zone ID Cloudflare Anda pada panel kiri terlebih dahulu.</p>
                                    </div>
                                ) : loading ? (
                                    <div className="flex-grow flex flex-col items-center justify-center gap-3 py-12">
                                        <svg className="animate-spin h-8 w-8 text-orange-500" fill="none" viewBox="0 0 24 24">
                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                                        </svg>
                                        <p className="text-xs text-slate-500">Membaca basis data Cloudflare...</p>
                                    </div>
                                ) : filteredRecords.length === 0 ? (
                                    <div className="flex-grow flex flex-col items-center justify-center text-center py-12 border-2 border-dashed border-slate-800 rounded-xl p-8 bg-slate-950/20">
                                        <svg className="w-10 h-10 text-slate-700 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                                        </svg>
                                        <p className="text-sm font-semibold text-slate-400">Tidak ada subdomain ditemukan</p>
                                        <p className="text-xs text-slate-600 mt-1 max-w-xs">Periksa kembali kredensial Anda, atau buat subdomain baru di sebelah kiri.</p>
                                        <button 
                                            onClick={fetchRecords} 
                                            className="mt-4 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-xs text-slate-300 font-semibold border border-slate-700/65 rounded-lg transition-colors"
                                        >
                                            Muat Ulang
                                        </button>
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto rounded-xl border border-slate-800/80 bg-slate-950/30">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-950/80 border-b border-slate-800 text-[11px] font-bold tracking-wider text-slate-400">
                                                    <th className="py-3 px-4">Subdomain</th>
                                                    <th className="py-3 px-3">Tipe</th>
                                                    <th className="py-3 px-3">Target</th>
                                                    <th className="py-3 px-3">Proxy</th>
                                                    <th className="py-3 px-4 text-right">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-850/60 text-xs">
                                                {filteredRecords.map((rec) => (
                                                    <tr key={rec.id} className="hover:bg-slate-900/30 transition-colors">
                                                        <td className="py-3.5 px-4 font-bold text-slate-200">
                                                            {rec.name}
                                                        </td>
                                                        <td className="py-3.5 px-3">
                                                            <span className={`inline-flex px-2 py-0.5 rounded-md text-[10px] font-bold ${
                                                                rec.type === 'A' ? 'bg-blue-500/10 text-blue-400 border border-blue-500/20' :
                                                                rec.type === 'CNAME' ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20' :
                                                                'bg-purple-500/10 text-purple-400 border border-purple-500/20'
                                                            }`}>
                                                                {rec.type}
                                                            </span>
                                                        </td>
                                                        <td className="py-3.5 px-3 text-slate-400 max-w-[160px] truncate" title={rec.content}>
                                                            {rec.content}
                                                        </td>
                                                        <td className="py-3.5 px-3">
                                                            {rec.proxied ? (
                                                                <span className="flex items-center gap-1.5 text-orange-400 font-medium" title="Proxied through Cloudflare">
                                                                    <span className="w-1.5 h-1.5 rounded-full bg-orange-500"></span>
                                                                    Proxied
                                                                </span>
                                                            ) : (
                                                                <span className="flex items-center gap-1.5 text-slate-500 font-medium" title="DNS Only">
                                                                    <span className="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                                                                    Bypass
                                                                </span>
                                                            )}
                                                        </td>
                                                        <td className="py-3.5 px-4 text-right">
                                                            <button 
                                                                onClick={() => {
                                                                    setConfirmDeleteId(rec.id);
                                                                    setConfirmDeleteName(rec.name);
                                                                }}
                                                                className="p-2 text-slate-500 hover:text-rose-400 bg-slate-900 hover:bg-rose-500/10 rounded-lg border border-slate-800 hover:border-rose-500/20 transition-all active:scale-95"
                                                                title="Hapus Subdomain"
                                                            >
                                                                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                                </svg>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                <div className="mt-auto pt-4 flex justify-between items-center text-[11px] text-slate-600">
                                    <span>Menampilkan {filteredRecords.length} dari {records.length} total record</span>
                                    {isCredentialsSaved && (
                                        <button 
                                            onClick={fetchRecords} 
                                            className="hover:text-slate-300 flex items-center gap-1 transition-colors"
                                        >
                                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 4.79M9 9h1.5m1.5 0H12v-.5V6m0 3v3h.5m-3-3h3" />
                                            </svg>
                                            Perbarui Tampilan
                                        </button>
                                    )}
                                </div>
                            </section>

                        </div>
                    </main>

                    {/* Footer Informasi */}
                    <footer className="border-t border-slate-900 bg-slate-950/40 py-6 mt-12 text-center text-xs text-slate-600">
                        <div className="max-w-7xl mx-auto px-4">
                            <p>© 2026 CF Subdomain Console - Akses Terproteksi & Mandiri</p>
                        </div>
                    </footer>

                    {/* Dialog Konfirmasi Hapus Ganda */}
                    {confirmDeleteId && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/85 backdrop-blur-sm">
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-sm w-full p-6 shadow-2xl relative">
                                <h3 className="text-sm font-bold text-white mb-2 flex items-center gap-2">
                                    <svg className="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                    </svg>
                                    Konfirmasi Hapus Permanen
                                </h3>
                                <p className="text-xs text-slate-400 mb-6 leading-relaxed">
                                    Apakah Anda benar-benar yakin ingin menghapus subdomain <strong className="text-slate-200">{confirmDeleteName}</strong>? Sistem akan memproses perintah langsung ke DNS Cloudflare.
                                </p>
                                <div className="flex gap-3 justify-end">
                                    <button 
                                        onClick={() => setConfirmDeleteId(null)}
                                        className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-semibold border border-slate-700/50 transition-colors"
                                    >
                                        Batalkan
                                    </button>
                                    <button 
                                        onClick={() => handleDeleteRecord(confirmDeleteId)}
                                        className="px-4 py-2 bg-rose-600 hover:bg-rose-500 text-white rounded-lg text-xs font-semibold shadow-lg shadow-rose-600/15 transition-colors"
                                    >
                                        Ya, Hapus Permanen
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Notifikasi Toast */}
                    {toast && (
                        <Toast 
                            message={toast.message} 
                            type={toast.type} 
                            onClose={() => setToast(null)} 
                        />
                    )}
                </div>
            );
        }

        // Memulai dan merender aplikasi React
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
